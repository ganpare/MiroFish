  - concept
  - argument
  - critique
  - metaphysics
  - epistemology
  - ethics
entity_types:
  - Concept
  - Claim
  - School
  - Philosopher
  - Text
  - Method
  - Problem
  - Distinction
  - Tradition
relation_types:
  - DEFINES
  - DISTINGUISHES_FROM
  - CRITIQUES
  - SUPPORTS
  - REFINES
  - REJECTS
  - DERIVES_FROM
  - RESPONDS_TO
